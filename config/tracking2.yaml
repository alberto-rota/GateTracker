parameters:

  # ===== PROJECT =====
  PROJECT:
    value: "GateTracker"
  WANDB_ENTITY:
    value: ""
  RUN:
    value: ""
  NOTES:
    value: ""

  # ===== PHASE =====
  # pretrain: descriptor / fusion / refinement (pairwise matching); no tracking losses
  PHASE:
    value: "tracking"
  FROM_PRETRAINED_CHECKPOINT:
    value: ""
  PRETRAINED_DESCRIPTOR_CKPT:
    value: "lilac-galaxy-57"

  # ===== DATA =====
  # Phase-aware splits (optional): PHASES lists which pipeline uses this dataset
  # (pretrain | tracking). PRETRAIN / TRACKING blocks override TRAIN_VIDEOS /
  # VAL_VIDEOS / TEST_VIDEOS for that phase. MAX_*_VIDEOS caps list size after patterns.
  # STIR is eval-only (no Mono3D class): PHASES: [tracking], PATH, CAMERA, COLLECTION_GLOBS.
  IMAGE_HEIGHT:
    value: 448
  IMAGE_WIDTH:
    value: 448
  BATCH_SIZE:
    value: 4
  DISTRIBUTE:
    value: "singlegpu"
  DISTBACKEND:
    value: "nccl"
  # DDP only: set true if forward sometimes skips parameters (optional heads).
  DDP_FIND_UNUSED_PARAMETERS:
    value: false
  DDP_SHUFFLE_SEED:
    value: 978654321
  SHUFFLE:
    value: True
  WORKERS:
    value: 6
  PIN_MEMORY:
    value: True
  PREFETCH_FACTOR:
    value: 1
  FEWFRAMES:
    value: False
  RANDOM_POSE_RANGES_OVERRIDE:
    value: [2.5, 3.25]
  DATASETS:
    value:
      SCARED:
        PATH: "SCARED"
        FPS: 32
        FRAMESKIP: [1, 2, 4, 8, 16, 24, 32]
        TRAIN_VIDEOS: ["train_*"]
        VAL_VIDEOS: [""]
        TEST_VIDEOS: ["test_*"]
        RANDOM_POSE_TRAINING: True
        RANDOM_POSE_RANGES: [2.5, 3.25]
        CURRICULUM_FACTOR: 1
        AUGMENTATION_PROBABILITY: {
          COLOR: 0.8,
          GEOMETRIC: 0.0,
          REVERSE: 0.0,
          STANDSTILL: 0.0
        }
        CROP_ZOOM_FACTOR: 1.0

      CHOLEC80:
        PATH: "CHOLEC80/videos"
        FPS: 80
        FRAMESKIP: [1]
        TRAIN_VIDEOS: ["train_video*"]
        TEST_VIDEOS: [""]
        VAL_VIDEOS: ["test_video*"]
        RANDOM_POSE_TRAINING: True
        RANDOM_POSE_RANGES: [2.5, 3.25]
        CURRICULUM_FACTOR: 1
        AUGMENTATION_PROBABILITY: {
          COLOR: 0.0,
          GEOMETRIC: 0.0,
          REVERSE: 0.0,
          STANDSTILL: 0.0
        }
        CROP_ZOOM_FACTOR: 1.2

      STEREOMIS:
        PATH: "StereoMIS_Tracking"
        FPS: 4
        FRAMESKIP: [1, 2]
        TRAIN_VAL_SPLIT: 0.7
        TRAIN_VIDEOS: [""]
        VAL_VIDEOS: ["test_P3_1"]
        TEST_VIDEOS: ["test_P3_1"]
        RANDOM_POSE_TRAINING: True
        RANDOM_POSE_RANGES: [2.5, 3.25]
        CURRICULUM_FACTOR: 1
        AUGMENTATION_PROBABILITY: {
          COLOR: 0.8,
          GEOMETRIC: 0.0,
          REVERSE: 0.0,
          STANDSTILL: 0.0
        }
        CROP_ZOOM_FACTOR: 1.2

      STIR:
        PHASES: ["tracking"]
        PATH: "STIR_04"
        CAMERA: "left"
        COLLECTION_GLOBS: ["*"]
        FPS: 8
        FRAMESKIP: [1]
        TRAIN_VIDEOS: []
        VAL_VIDEOS: ["*/*/*"]
        TEST_VIDEOS: ["*/*/*"]
        RANDOM_POSE_TRAINING: False
        RANDOM_POSE_RANGES: [2.5, 3.25]
        CURRICULUM_FACTOR: 1
        AUGMENTATION_PROBABILITY: { COLOR: 0.0, GEOMETRIC: 0.0, REVERSE: 0.0, STANDSTILL: 0.0 }
        CROP_ZOOM_FACTOR: 1.0

  # ===== BACKBONE =====
  DINO_MODEL_NAME:
    value: "facebook/dinov3-vitl16-pretrain-lvd1689m"
  DINO_LAYERS:
    value: "all"

  # ===== FUSION =====
  FUSION_HEAD:
    value: "register_gated_hierarchical"
  FUSION_GATE_TEMPERATURE:
    value: 2.0
  FUSION_GATE_TEMPERATURE_FINAL:
    value: 0.5
  FUSION_GATE_ANNEAL_EPOCHS:
    value: 10
  FUSION_UNIFORM_MIXING:
    value: 0.0
  FUSION_LAYER_DROPOUT:
    value: 0.10
  FUSION_GATE_LOGIT_BOUND:
    value: 8.0

  # ===== MATCHING =====
  TRIPLETS_TO_MINE:
    value: 128
  PATCH_MATCHING_SCORE_THRESHOLD:
    value: 0.975
  PIXEL_MATCHING_SCORE_THRESHOLD:
    value: 0.15
  MIN_MATCHES_TO_COLLECT:
    value: 256
  MAX_MATCHES_TO_PROCESS:
    value: 500
  MAX_EPIPOLAR_DISTANCE:
    value: 2
  SCORE_WEIGHTS:
    value: {
      DESCRIPTOR: 0.2,
      REFINEMENT: 0.3,
      EPIPOLAR: 0.6
    }
  USE_CORRESPONDENCE_CONFIDENCE:
    value: True
  CONFIDENCE_PHOTOMETRIC_BETA:
    value: 6.0
  CONFIDENCE_PATCH_VALID_RATIO:
    value: 0.35

  # ===== REFINEMENT =====
  REFINEMENT_METHOD:
    value: "feature_softargmax"
  REFINEMENT_AREA:
    value: 4
  RESAMPLED_PATCH_SIZE:
    value: 16
  FINE_REFINEMENT_DIM:
    value: 64
  FINE_FEATURE_STRIDE:
    value: 4
  FINE_REFINEMENT_WINDOW_RADIUS:
    value: 2
  FINE_REFINEMENT_TEMPERATURE:
    value: 0.1
  FINE_REFINEMENT_CONTEXT_LAYER:
    value: "auto"

  # ===== TRACKING FLAGS (pairwise head disabled in pretrain) =====
  TRACKING_MODE:
    value: True
  TRACKING_HEAD:
    value: True

  # ===== LOSSES =====
  DESCRIPTOR_LOSS:
    value: "infonce"
  INFONCE_TEMPERATURE:
    value: 0.07
  INFONCE_SYMMETRIC:
    value: True
  FINE_REFINEMENT_LOSS_WEIGHT:
    value: 0.25
  FINE_REFINEMENT_LOSS_BETA:
    value: 1.0
  # Entropy-minimization regularizer on fusion gate weights to encourage
  # layer specialization. 0.0 disables the term.
  GATE_ENTROPY_WEIGHT:
    value: 0.05
  LOSS_WEIGHT:
    value: {
      Fundamental: 0.8
    }
  LOSS_THRESHOLDS_WANDB:
    value: {
      Epipolar: 1
    }

  # ===== OPTIMIZATION =====
  OPTIMIZER:
    value: "Adam"
  LEARNING_RATE:
    value: 1.0e-5
  LR_FUSION:
    value: 1.0e-5
  LR_FINE_FEATURE:
    value: 1.0e-5
  # Gate sub-modules are tiny: boost their LR so the gate can track the
  # descriptor objective faster than the fusion projections.
  LR_GATE:
    value: 5.0e-5
  WEIGHT_DECAY:
    value: 0.0
  GRADIENT_ACCUMULATION_STEPS:
    value: 1
  EPOCHS:
    value: 50
  WARMUP_STEPS:
    value: 0
  EARLYSTOPPING_PATIENCE:
    value: 50
  LR_SCHEDULER:
    value: "cosine"
  COSINESCHEDULER_NPERIODS:
    value: 0.5
  STEPWISESCHEDULER_NSTEPS:
    value: 3
  STEPWISESCHEDULER_GAMMA:
    value: 0.5

  # ===== GEOMETRY =====
  GEOMETRY_MODEL_NAME:
    value: "Ruicheng/moge-2-vits-normal"
  DEPTH_SCALE_FACTOR:
    value: 60
  DEPTH_BIAS_FACTOR:
    value: 30

  # ===== LOGGING =====
  NO_WANDB:
    value: False
  LOG_FREQ_WANDB:
    value: 10
  MODEL_WATCHER_FREQ_WANDB:
    value: 5

  # ===== TRACKING TRAIN-TIME SIZING =====
  # Train-time memory scales as O(B * Q * T * H * N_blocks * N_iters) for the
  # refinement net activations (the backbone is frozen so encoding is
  # no_grad), plus a second forward+backward pass for the cycle-loss reverse
  # tracking. The previous setting (B=32, T=24, Q=1024, iters=6) overflowed
  # 48-80 GB; these values are tuned to fit a single A40 48GB while keeping
  # the long-horizon learning signal strong. The *architecture* (hidden dim,
  # blocks, corr radius, kernel) is kept at long-horizon values below --
  # raise these train-time knobs back up on an 80 GB card while watching
  # nvidia-smi. Inference uses ``TemporalTracker.track_long_sequence`` with
  # sliding windows anchored to the **original** query descriptor, so test-
  # time horizon is not bounded by ``TRACKING_SEQUENCE_LENGTH``.
  TRACKING_BATCH_SIZE:
    value: 16
  TRACKING_SEQUENCE_LENGTH:
    value: 32
  TRACKING_NUM_QUERY_POINTS:
    value: 128
  TRACKING_WORKERS:
    value: 4
  TRACKING_ENCODER_CHUNK_SIZE:
    value: 16
  # Step between window **start** frames when indexing training clips (larger
  # ⇒ fewer batches per epoch). Default when omitted: ``TRACKING_SEQUENCE_LENGTH // 2``.
  TRACKING_WINDOW_TRAIN_STRIDE:
    value: 48
  # Sliding-window visibility fusion: ``min`` is pessimistic (any window doubts
  # → low vis); ``mean`` is the legacy behaviour.
  TRACKING_LONGSEQ_VIS_AGG:
    value: "min"
  # Optional hard cap on per-frame displacement (pixels); 0 disables.
  TRACKING_INFER_MAX_STEP_PX:
    value: 0

  # ===== TEMPORAL REFINEMENT NETWORK (architecture) =====
  # Sized for long-horizon reasoning: a 9x9 local correlation window
  # (CORR_RADIUS=4) plus a 7-tap depthwise temporal kernel at H=192 with
  # 6 mixer blocks. ``NUM_ITERS=4`` balances refinement depth against
  # per-iter activation storage; training with 4 iters still generalises
  # to running with more iters at inference (each iter shares weights).
  TEMPORAL_REFINEMENT_HIDDEN_DIM:
    value: 192
  TEMPORAL_REFINEMENT_NUM_BLOCKS:
    value: 6
  TEMPORAL_REFINEMENT_NUM_ITERS:
    value: 4
  TEMPORAL_REFINEMENT_CORR_RADIUS:
    value: 4
  TEMPORAL_REFINEMENT_KERNEL_SIZE:
    value: 7
  TEMPORAL_REFINEMENT_SOFTMAX_TEMPERATURE:
    value: 0.07

  # ===== TEMPORAL TRACKING LOSS WEIGHTS =====
  # ``descriptor`` and ``feature`` losses are the ones that explicitly tie the
  # tracked location at every frame back to the **original** query descriptor
  # / fine feature, so they get the highest weight for long-horizon work.
  TEMPORAL_CYCLE_LOSS_WEIGHT:
    value: 1.0
  TEMPORAL_SMOOTHNESS_LOSS_WEIGHT:
    value: 0.5
  # First-order Huber on ||p_{t+1}-p_t|| (pixels); damps brief outlier jumps that
  # second-order smoothness can miss when visibility weights are high.
  TEMPORAL_VELOCITY_HUBER_WEIGHT:
    value: 0.22
  TEMPORAL_VELOCITY_HUBER_BETA:
    value: 6.0
  TEMPORAL_DESC_LOSS_WEIGHT:
    value: 0.75
  TEMPORAL_FEATURE_LOSS_WEIGHT:
    value: 0.75
  TEMPORAL_VIS_REG_WEIGHT:
    value: 0.1
  # With dense occluder-labelled negatives we no longer need an anti-collapse
  # pull toward 0.5: set this to 0 so BCE can drive logits to be sharp.
  TEMPORAL_VIS_REG_ENTROPY_SCALE:
    value: 0.0

  # ===== TRACKING OPTIMIZER =====
  # ``LEARNING_RATE`` (1e-5) is sized for descriptor pretraining; using it
  # for the **freshly initialised** refinement net is far too small. Use a
  # dedicated LR with cosine decay scheduled over EPOCHS.
  LR_TEMPORAL_REFINEMENT:
    value: 2.0e-4
  LR_TEMPORAL_REFINEMENT_MIN:
    value: 2.0e-6

  # ===== STEREOMIS / STIR / PSEUDO VAL (PHASE=tracking, each val epoch) =====
  # StereoMIS: metrics on all VAL_VIDEOS matches; W&B videos for one random seq/epoch.
  TRACKING_STEREOMIS_VAL:
    value: True
  TRACKING_STEREOMIS_VAL_MAX_FRAMES:
    value: null
  TRACKING_STEREOMIS_TEST_MAX_FRAMES:
    value: null
  TRACKING_STEREOMIS_VAL_GRID:
    value: 20
  TRACKING_VAL_VIDEO_SEED:
    value: 424242
  TRACKING_VAL_RENDER_VIDEOS_ALL_SEQS:
    value: False
  TRACKING_STIR_VAL:
    value: True
  TRACKING_STIR_TEST_MAX_FRAMES:
    value: null
  # One forced novel-view pseudo clip + sparse GT vs pred video (main rank only).
  TRACKING_VAL_PSEUDO_NOVELVIEW:
    value: True
  TRACKING_VAL_PSEUDO_GRID_SIZE:
    value: 8
  TRACKING_VAL_PSEUDO_SPARSE_STRIDE:
    value: 2
  TRACKING_VAL_PSEUDO_MAX_POINTS:
    value: 64
  TRACKING_VAL_PSEUDO_BATCH_INDEX:
    value: 0

  # ===== PSEUDO-GT (novel-view) supervision for PHASE=tracking =====
  # Hybrid training: per-step Bernoulli(PSEUDO_GT_MIX) replaces the window with pseudo
  # views; supervised weight ramps to PSEUDO_GT_SUP_LAMBDA_MAX over PSEUDO_GT_CURRICULUM_EPOCHS.
  # Pseudo-GT is currently the **only** signal that supervises long-horizon
  # absolute positions (cycle/smoothness/desc losses are local), so it is
  # weighted significantly stronger than the descriptor-pretrain default.
  PSEUDO_GT_MIX:
    value: 0.8
  PSEUDO_GT_SUP_LAMBDA_MAX:
    value: 0.5
  PSEUDO_GT_CURRICULUM_EPOCHS:
    value: 10
  PSEUDO_GT_GRID_SIZE:
    value: 8
  PSEUDO_GT_GRID_MARGIN_FRAC:
    value: 0.03
  PSEUDO_GT_MASK_ERODE_PX:
    value: 0
  # Stochastic camera path + scene deformation for :class:`PseudoGTGenerator`.
  # ``n_frames`` is always the batch window length ``T`` (``TRACKING_SEQUENCE_LENGTH``);
  # any ``n_frames`` key here is ignored.
  PSEUDO_GT_TRAJECTORY:
    value:
      z_bias_range: [-0.05, 0.05]
      complexity_range: [0.3, 0.7]
      translation_range: [0.02, 0.08]
      rotation_range_deg: [2.0, 8.0]
      forward_bias_range: [0.005, 0.02]
      speed_scale_range: [0.5, 1.5]
      still_fraction_range: [0.0, 0.15]
      # Hard lower bound on camera-to-cloud clearance as a fraction of the
      # scene's nearest-point distance.  If the sampled trajectory would
      # ever breach this bound the translations are globally rescaled so the
      # camera never flies into the point cloud (which caused the large
      # black "novel view hole" regions previously).
      min_scene_clearance_frac: 0.5
  PSEUDO_GT_DEFORMATION:
    value:
      n_deformers_range: [2, 5]
      # Shared fallback ranges (used when a per-type range below is unset).
      sigma_frac_range: [0.10, 0.25]
      amplitude_frac_range: [0.005, 0.02]
      drag_weight: 0.5
      inflate_weight: 0.3
      twist_weight: 0.2
      twist_max_deg_range: [3.0, 8.0]    # twists a bit stronger
      temporal_smooth_range: [3.0, 6.0]

      # Per-type overrides: big-smooth-low-amplitude inflations;
      # small-concentrated-strong twists; default drag.
      inflate_sigma_frac_range: [0.25, 0.45]
      inflate_amplitude_frac_range: [0.003, 0.010]
      twist_sigma_frac_range: [0.08, 0.18]
      # Drag inherits the shared range.

      # Safety rails against inflation-induced black holes in the novel view
      # (points becoming too sparse in screen-space).
      max_inflate_displacement_frac: 0.012
      inflate_radial_softness: 0.06
  # Synthetic 2-D occluder sprites composited into the pseudo-GT clips.
  # These provide the **dense pixel-accurate visibility negatives** the BCE
  # head is starved of: the depth-only visibility test on a single-layer
  # novel-view almost never flags occluded queries, so without this block
  # the visibility head collapses to "always visible" and tracked points
  # drift wildly once they are occluded in real inference videos. Disable
  # by setting ``n_range: [0, 0]`` (or removing the block entirely).
  PSEUDO_GT_OCCLUDERS:
    value:
      n_range: [1, 3]
      size_frac_range: [0.05, 0.15]
      motion_frac_range: [0.0, 0.5]
      sinusoid_frac_range: [0.0, 0.05]
      lifetime_frac_range: [0.3, 0.9]
      # Domain-aware colour: sample each sprite's base RGB from a random
      # patch of the source image so occluders stay inside the endoscopic
      # colour manifold (no out-of-domain blue occluders on red tissue).
      sample_color_from_image: true
      color_patch_frac_range: [0.02, 0.08]
      color_brightness_range: [0.6, 1.2]
      # Legacy uniform sampler — used only when sample_color_from_image: false.
      appearance_value_range: [0.0, 1.0]
      appearance_noise_std: 0.04
      vis_alpha_threshold: 0.5
      apply_to_frame_valid: true
  PSEUDO_GT_VIS_APPEARANCE_AWARE:
    value: False
  PSEUDO_GT_SYNTH_SELF_SUP_SCALE:
    value: 1.0
  TEMPORAL_SUP_POS_WEIGHT:
    value: 1.0
  # Down-weight for the Huber position loss on occluded frames. The
  # broadened ``position_supervision_mask`` now keeps occluded-but-in-bounds
  # frames so the model learns to *continue* the track through
  # occlusions, but those frames are less certain than fully visible
  # ones, so they contribute with a smaller weight (``0`` disables
  # position supervision on occluded frames, ``1`` treats them equally).
  TEMPORAL_SUP_POS_OCC_WEIGHT:
    value: 0.25
  TEMPORAL_SUP_VIS_WEIGHT:
    value: 3.0
  # Extra weight on BCE for occluded (target 0) frames vs visible frames.
  TEMPORAL_SUP_VIS_OCC_WEIGHT:
    value: 2.5
  TEMPORAL_SUP_HUBER_BETA:
    value: 1.0
  # --- Visualization knob -----------------------------------------------
  # When ``True``, ``render_comparison_video`` hides predicted points on
  # frames where the visibility head predicts occluded (legacy behaviour).
  # When ``False`` (default), predicted-occluded points are still drawn
  # as hollow, alpha-blended rings plus a green/red/orange confusion ring
  # so the operator can visually audit the visibility head.
  TRACKING_VAL_COMP_GATE_PREDVIS:
    value: False
