parameters:

  # ===== PROJECT =====
  PROJECT:
    value: "GateTracker"
  WANDB_ENTITY:
    value: ""
  RUN:
    value: ""
  NOTES:
    value: ""

  # ===== PHASE =====
  # pretrain: descriptor / fusion / refinement (pairwise matching); no tracking losses
  PHASE:
    value: "pretrain"
  FROM_PRETRAINED_CHECKPOINT:
    value: ""
  PRETRAINED_DESCRIPTOR_CKPT:
    value: ""

  # ===== DATA =====
  # Optional per-dataset: PHASES: [pretrain] | [tracking] | both; PRETRAIN/TRACKING
  # override video lists for that phase; MAX_TRAIN_VIDEOS / MAX_VAL_VIDEOS / MAX_TEST_VIDEOS.
  IMAGE_HEIGHT:
    value: 448
  IMAGE_WIDTH:
    value: 448
  BATCH_SIZE:
    value: 16
  # singlegpu | dp | ddp (CLI ``--ddp`` / ``--dp`` / ``--single`` overrides this)
  DISTRIBUTE:
    value: "singlegpu"
  DISTBACKEND:
    value: "nccl"
  # DDP only: set true if forward sometimes skips parameters (optional heads).
  DDP_FIND_UNUSED_PARAMETERS:
    value: false
  DDP_SHUFFLE_SEED:
    value: 978654321
  SHUFFLE:
    value: True
  WORKERS:
    value: 6
  PIN_MEMORY:
    value: True
  PREFETCH_FACTOR:
    value: 1
  FEWFRAMES:
    value: False
  RANDOM_POSE_RANGES_OVERRIDE:
    value: [2.0, 4.5]
  DATASETS:
    value:
      SCARED:
        PATH: "SCARED"
        FPS: 16
        FRAMESKIP: [1, 2, 4, 8, 16, 24, 32]
        TRAIN_VIDEOS: ["train_v*"]
        VAL_VIDEOS: ["test_*"]
        TEST_VIDEOS: [""]
        RANDOM_POSE_TRAINING: True
        RANDOM_POSE_RANGES: [2.0, 4.5]
        CURRICULUM_FACTOR: 1
        AUGMENTATION_PROBABILITY: {
          COLOR: 0.8,
          GEOMETRIC: 0.0,
          REVERSE: 0.0,
          STANDSTILL: 0.0
        }
        CROP_ZOOM_FACTOR: 1.0

      CHOLEC80:
        PATH: "CHOLEC80/videos"
        FPS: 20
        FRAMESKIP: [1]
        TRAIN_VIDEOS: ["train_video*"]
        TEST_VIDEOS: ["test_video*"]
        VAL_VIDEOS: ["test_video*"]
        RANDOM_POSE_TRAINING: True
        RANDOM_POSE_RANGES: [2.0, 4.5]
        CURRICULUM_FACTOR: 1
        AUGMENTATION_PROBABILITY: {
          COLOR: 0.8,
          GEOMETRIC: 0.0,
          REVERSE: 0.0,
          STANDSTILL: 0.0
        }
        CROP_ZOOM_FACTOR: 1.2

  # ===== BACKBONE =====
  DINO_MODEL_NAME:
    value: "facebook/dinov3-vitl16-pretrain-lvd1689m"
  DINO_LAYERS:
    value: "all"

  # ===== FUSION =====
  FUSION_HEAD:
    value: "register_gated_hierarchical"
  FUSION_GATE_TEMPERATURE:
    value: 2.0
  FUSION_GATE_TEMPERATURE_FINAL:
    value: 0.5
  FUSION_GATE_ANNEAL_EPOCHS:
    value: 10
  FUSION_UNIFORM_MIXING:
    value: 0.0
  FUSION_LAYER_DROPOUT:
    value: 0.10
  FUSION_GATE_LOGIT_BOUND:
    value: 8.0

  # ===== MATCHING =====
  TRIPLETS_TO_MINE:
    value: 128
  PATCH_MATCHING_SCORE_THRESHOLD:
    value: 0.975
  PIXEL_MATCHING_SCORE_THRESHOLD:
    value: 0.15
  MIN_MATCHES_TO_COLLECT:
    value: 256
  MAX_MATCHES_TO_PROCESS:
    value: 500
  MAX_EPIPOLAR_DISTANCE:
    value: 2
  SCORE_WEIGHTS:
    value: {
      DESCRIPTOR: 0.2,
      REFINEMENT: 0.3,
      EPIPOLAR: 0.6
    }
  USE_CORRESPONDENCE_CONFIDENCE:
    value: True
  CONFIDENCE_PHOTOMETRIC_BETA:
    value: 6.0
  CONFIDENCE_PATCH_VALID_RATIO:
    value: 0.35

  # ===== REFINEMENT =====
  REFINEMENT_METHOD:
    value: "feature_softargmax"
  REFINEMENT_AREA:
    value: 4
  RESAMPLED_PATCH_SIZE:
    value: 16
  FINE_REFINEMENT_DIM:
    value: 64
  FINE_FEATURE_STRIDE:
    value: 4
  FINE_REFINEMENT_WINDOW_RADIUS:
    value: 2
  FINE_REFINEMENT_TEMPERATURE:
    value: 0.1
  FINE_REFINEMENT_CONTEXT_LAYER:
    value: "auto"

  # ===== TRACKING FLAGS (pairwise head disabled in pretrain) =====
  TRACKING_MODE:
    value: False
  TRACKING_HEAD:
    value: False

  # ===== LOSSES =====
  DESCRIPTOR_LOSS:
    value: "infonce"
  INFONCE_TEMPERATURE:
    value: 0.07
  INFONCE_SYMMETRIC:
    value: True
  FINE_REFINEMENT_LOSS_WEIGHT:
    value: 0.25
  FINE_REFINEMENT_LOSS_BETA:
    value: 1.0
  # Entropy-minimization regularizer on fusion gate weights to encourage
  # layer specialization. 0.0 disables the term. Raised from 0.05 to 0.15
  # to force flatter, more transferable gate distributions and reduce the
  # train/val gap on ``effective_layer``.
  GATE_ENTROPY_WEIGHT:
    value: 0.15
  # Freeze gate sub-modules (``local_gates``, ``register_gates``) for the
  # first ``GATE_FREEZE_EPOCHS`` training epochs, forcing descriptors and
  # refinement to work across all DINOv3 layers with a near-uniform gate
  # before the gate is allowed to specialize. ``0`` disables freezing.
  GATE_FREEZE_EPOCHS:
    value: 10
  LOSS_WEIGHT:
    value: {
      Fundamental: 0.8
    }
  LOSS_THRESHOLDS_WANDB:
    value: {
      Epipolar: 1
    }

  # ===== OPTIMIZATION =====
  OPTIMIZER:
    value: "Adam"
  LEARNING_RATE:
    value: 1.0e-4
  LR_FUSION:
    value: 1.0e-4
  LR_FINE_FEATURE:
    value: 1.0e-4
  # Gate sub-modules are tiny: boost their LR so the gate can track the
  # descriptor objective faster than the fusion projections.
  LR_GATE:
    value: 5.0e-4
  # Nonzero decay is standard for ViT-based setups with a trainable backbone.
  WEIGHT_DECAY:
    value: 1.0e-4
  GRADIENT_ACCUMULATION_STEPS:
    value: 1
  EPOCHS:
    value: 200
  WARMUP_STEPS:
    value: 0
  # TODO: drop to 25 once the unified ``Loss == EpipolarError`` signal has
  # stabilized in wandb and the val curve is visibly smoother.
  EARLYSTOPPING_PATIENCE:
    value: 50
  LR_SCHEDULER:
    value: "cosine"
  COSINESCHEDULER_NPERIODS:
    value: 0.5
  STEPWISESCHEDULER_NSTEPS:
    value: 3
  STEPWISESCHEDULER_GAMMA:
    value: 0.5

  # ===== GEOMETRY =====
  GEOMETRY_MODEL_NAME:
    value: "Ruicheng/moge-2-vits-normal"
  DEPTH_SCALE_FACTOR:
    value: 60
  DEPTH_BIAS_FACTOR:
    value: 30

  # ===== LOGGING =====
  NO_WANDB:
    value: False
  LOG_FREQ_WANDB:
    value: 10
  MODEL_WATCHER_FREQ_WANDB:
    value: 5
