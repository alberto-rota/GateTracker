  PREFETCH_FACTOR:
    value: 1
  FEWFRAMES:
    value: false
  RANDOM_POSE_RANGES_OVERRIDE:
    value: [2.5, 3.25]

  DATASETS:
    value:
      SCARED:
        FPS: 32
        PATH: "/home/shared/nearmrs/arota/SCARED"
        FRAMESKIP: [1, 2, 4, 8, 16, 24, 32]
        VAL_VIDEOS: ["test_*"]
        TEST_VIDEOS: ["test_*"]
        TRAIN_VIDEOS: ["train_v*"]
        CROP_ZOOM_FACTOR: 1
        CURRICULUM_FACTOR: 1
        RANDOM_POSE_RANGES: [2.5, 3.25]
        RANDOM_POSE_TRAINING: true
        AUGMENTATION_PROBABILITY:
          COLOR: 0.8
          REVERSE: 0
          GEOMETRIC: 0
          STANDSTILL: 0
      CHOLEC80:
        FPS: 80
        PATH: "/home/shared/nearmrs/arota/CHOLEC80/videos"
        FRAMESKIP: [1]
        VAL_VIDEOS: ["test_video*"]
        TEST_VIDEOS: ["test_video*"]
        TRAIN_VIDEOS: ["train_video02"]
        CROP_ZOOM_FACTOR: 1.2
        CURRICULUM_FACTOR: 1
        RANDOM_POSE_RANGES: [2.5, 3.25]
        RANDOM_POSE_TRAINING: true
        AUGMENTATION_PROBABILITY:
          COLOR: 0
          REVERSE: 0
          GEOMETRIC: 0
          STANDSTILL: 0
