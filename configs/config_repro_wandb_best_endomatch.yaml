# Reproducer for the W&B run that logged Training/DescriptorLoss etc. under EndoMatch.
# Refactor notes:
# - Set PHASE: end2end (same training loop as legacy PHASE: pretrain + TRACKING_MODE: true).
# - OPTIMIZER: Adam (W&B exports often only listed OPTIMIZER_BOOTSTRAP_NAME; engine_init now falls back).
parameters:

  PROJECT:
    value: "GateTracker"
  WANDB_ENTITY:
    value: ""
  RUN:
    value: ""
  NOTES:
    value: ""

  PHASE:
    value: "end2end"
  FROM_PRETRAINED_CHECKPOINT:
